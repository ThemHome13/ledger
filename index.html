<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>$LEDGER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#e8e6f0;font-family:'DM Mono','Courier New',monospace;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
input,select,button{outline:none;-webkit-tap-highlight-color:transparent;}
input,select{font-size:16px!important;} /* prevent iOS zoom on focus */

/* ── Core components ── */
.card{background:#11111c;border:1px solid #1e1e30;border-radius:16px;padding:18px;}
.btn-primary{background:#7c6fff;color:#fff;border:none;border-radius:10px;padding:13px 22px;font-family:'DM Mono',monospace;font-size:14px;cursor:pointer;transition:all .2s;font-weight:500;touch-action:manipulation;}
.btn-primary:active{background:#9585ff;transform:scale(0.97);}
.btn-sm{background:#1a1a28;border:1px solid #2a2a40;color:#888;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;transition:all .15s;touch-action:manipulation;}
.btn-sm:active{color:#e8e6f0;border-color:#555;}
.input-field{background:#1a1a28;border:1px solid #2a2a40;color:#e8e6f0;border-radius:10px;padding:12px 14px;font-family:'DM Mono',monospace;font-size:16px;width:100%;transition:border-color .2s;}
.input-field:focus{border-color:#7c6fff;}
.row-hover:active{background:#16162a!important;}
.acct-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:10px;border:1px solid transparent;}
.lbl{font-size:11px;color:#555;letter-spacing:.08em;display:block;margin-bottom:6px;text-transform:uppercase;}
.color-swatch{width:28px;height:28px;border-radius:7px;border:2px solid transparent;cursor:pointer;transition:transform .1s;}
.color-swatch.selected{border-color:#fff;box-shadow:0 0 0 1px #fff4;}
.icon-btn{width:36px;height:36px;border-radius:8px;background:#1a1a28;border:1px solid #2a2a40;color:#aaa;cursor:pointer;font-size:16px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;touch-action:manipulation;}
.icon-btn.selected{border-color:#7c6fff;background:#7c6fff22;}
.seg-btn{background:none;border:1px solid transparent;cursor:pointer;padding:7px 11px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:#555;transition:all .15s;white-space:nowrap;touch-action:manipulation;}
.seg-btn.active{background:#1e1e30;color:#e8e6f0;border-color:#2a2a40;}

/* ── Scheduled + Budget ── */
.sched-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;background:#11111c;border:1px solid #1e1e30;}
.budget-box{background:#11111c;border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;}
.budget-box .accent{position:absolute;top:0;left:0;right:0;height:3px;}
.week-tx-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:9px;background:#0f0f1a;border:1px solid #1a1a28;margin-bottom:4px;}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e1e30;border:1px solid #2a2a40;padding:12px 22px;border-radius:12px;font-size:13px;z-index:300;animation:fadeUp .3s ease;box-shadow:0 8px 32px #0008;white-space:nowrap;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:#0009;z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease;padding:0;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#11111c;border:1px solid #2a2a40;border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));width:100%;max-width:100%;animation:slideUp .25s ease;max-height:92vh;overflow-y:auto;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ── TOP header bar ── */
.top-bar{position:sticky;top:0;z-index:50;background:#0a0a0f;border-bottom:1px solid #1e1e30;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:10px;}

/* ── Bottom tab nav (mobile) ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#0d0d18;border-top:1px solid #1e1e30;display:flex;padding-bottom:env(safe-area-inset-bottom);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px;gap:3px;background:none;border:none;cursor:pointer;color:#555;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.03em;touch-action:manipulation;min-height:56px;}
.tab-btn.active{color:#7c6fff;}
.tab-btn .tab-icon{font-size:18px;line-height:1;}

/* ── Page content padding (leaves room for bottom nav) ── */
.page-content{padding:16px 14px 100px 14px;max-width:980px;margin:0 auto;}

/* ── Action toolbar (hidden on mobile, shown in ⋯ menu) ── */
.toolbar-btn{background:#1a1a28;border:1px solid #2a2a40;color:#888;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;font-family:'DM Mono',monospace;touch-action:manipulation;display:flex;align-items:center;gap:6px;width:100%;}
.toolbar-btn:active{color:#e8e6f0;}

/* ── Responsive grids ── */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.grid-budget{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.grid-weekly{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

@media(max-width:600px){
  .grid-3{grid-template-columns:1fr;}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  .grid-budget{grid-template-columns:repeat(2,1fr);}
  .grid-weekly{grid-template-columns:1fr;}
  .modal{border-radius:20px 20px 0 0;max-width:100%;}
  .hide-mobile{display:none!important;}
  .page-content{padding:14px 12px 90px 12px;}
}
@media(min-width:601px){
  .bottom-nav{display:none;}
  .desktop-nav{display:flex!important;}
  .hide-desktop{display:none!important;}
  .top-bar{height:56px;}
  .page-content{padding:24px 20px 40px 20px;}
  .modal{border-radius:20px;max-width:480px;align-self:center;margin:auto;}
  .modal-bg{align-items:center;}
  .toast{bottom:28px;}
}
</style>
</head>

function load(key,def){try{const s=localStorage.getItem(key);if(s)return JSON.parse(s);}catch(e){}return def;}

/* ── Google Sheets sync ──────────────────────────────────────────────────── */
// READ  → fetch with no-cors then text parse (script is public, CORS allowed)
// WRITE → no-cors POST with URL-encoded form body (e.parameter.payload)

function sheetRead(url){
  return new Promise((resolve,reject)=>{
    const cbName="__ledgerCb_"+Date.now();
    const script=document.createElement("script");
    const timer=setTimeout(()=>{
      cleanup();
      reject(new Error("Timeout — script loaded but callback never fired (response may be too large)"));
    },20000);
    function cleanup(){
      clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName]=function(data){
      cleanup();
      if(!data) reject(new Error("Callback received null/undefined"));
      else if(typeof data==="string") reject(new Error("Got string instead of object: "+data.slice(0,100)));
      else if(data.error) reject(new Error("Script error: "+String(data.error)));
      else resolve(data);
    };
    script.onerror=()=>{
      cleanup();
      reject(new Error("Script tag failed to load"));
    };
    script.src=`${url}?action=read&callback=${cbName}&t=${Date.now()}`;
    document.head.appendChild(script);
  });
}

async function sheetWrite(url,payload){
  // Use JSONP (script tag) for writes too — the only truly reliable cross-origin method
  // Data is sent as a URL parameter, Apps Script reads from e.parameter.data
  return new Promise((resolve,reject)=>{
    const cbName="__ledgerWrite_"+Date.now();
    const script=document.createElement("script");
    const timer=setTimeout(()=>{
      cleanup();
      // Timeout is ok — write may still have landed, just no confirmation
      resolve({ok:true,savedAt:new Date().toISOString(),timedOut:true});
    },15000);
    function cleanup(){
      clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName]=function(data){
      cleanup();
      if(data&&data.error) reject(new Error(String(data.error)));
      else resolve(data||{ok:true});
    };
    script.onerror=()=>{
      cleanup();
      // Script errors on write are usually just CORS on the response — the write likely landed
      resolve({ok:true,savedAt:new Date().toISOString(),opaqueError:true});
    };
    const encoded=encodeURIComponent(JSON.stringify({...payload,action:"write"}));
    script.src=`${url}?callback=${cbName}&data=${encoded}&t=${Date.now()}`;
    document.head.appendChild(script);
  });
}
// Encode weekly_budget as [{key,value}] rows for the sheet
function encodeWb(wb){return[
  {key:"income",value:wb.income},
  {key:"incomeByAccount",value:JSON.stringify(wb.incomeByAccount||{})},
  {key:"bills",value:JSON.stringify(wb.bills)},
  {key:"weekTx",value:JSON.stringify(wb.weekTx)},
];}
function decodeWb(rows){
  const m=Object.fromEntries((rows||[]).map(r=>[r.key,r.value]));
  return{
    income:parseFloat(m.income)||0,
    incomeByAccount:m.incomeByAccount?JSON.parse(m.incomeByAccount):{},
    bills:m.bills?JSON.parse(m.bills):[],
    weekTx:m.weekTx?JSON.parse(m.weekTx):[],
  };
}

function loadSched(){
  const p=load(SCHED_KEY,null);
  if(p){nextSchedId=Math.max(...p.map(s=>parseInt(s.id.replace("s",""))||0),9)+1;return p;}

function loadWB(){
  const p=load(WB_KEY,null);
  if(p){
    if(p.bills)nextWbId=Math.max(...p.bills.map(b=>parseInt(b.id.replace("wb",""))||0),9)+1;
    if(p.weekTx)nextWtxId=Math.max(...p.weekTx.map(t=>parseInt(t.id.replace("wt",""))||0),0)+1;
    return p;
  }
  return{income:1433.39,incomeByAccount:{},bills:DEFAULT_WEEKLY_BILLS,weekTx:[]};
}

function fmt(n){
  const abs=Math.abs(n),s=abs.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  return n<0?`−$${s}`:`$${s}`;
}
function today(){return new Date().toISOString().slice(0,10);}
function ordinal(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

/* ── Modals ─────────────────────────────────────────────────────────────── */
function CategoryModal({onClose,onSave,editing}){
  const [label,setLabel]=useState(editing?editing.label:"");
  const [color,setColor]=useState(editing?editing.color:PALETTE[5]);
  const [icon,setIcon]=useState(editing?editing.icon:"•");
  const save=()=>{if(!label.trim())return;onSave({label:label.trim(),color,icon});};
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>

        </div>

    </div>
  );
}

const ACCT_ICONS=["🏦","💰","💳","🏧","💵","📈","🪙","🏪","🎯","💼","🏠","🚗"];
const ACCT_TYPES=["checking","savings","credit","cash","investment","other"];
function AccountModal({onClose,onSave,onDelete,account}){
  const isNew=!account.id;
  const [label,setLabel]=useState(account.label||"");
  const [color,setColor]=useState(account.color||PALETTE[9]);

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>

        <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800,marginBottom:20}}>{isNew?"New Account":"Edit Account"}</div>
        <div style={{padding:"12px 14px",background:`${color}12`,border:`1px solid ${color}33`,borderRadius:12,marginBottom:18,display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:24}}>{icon}</div>
          <div><div style={{fontSize:14,color,fontWeight:600}}>{label||"Account Name"}</div><div style={{fontSize:11,color:"#555",marginTop:2}}>{type} · ${parseFloat(balance||0).toFixed(2)} starting</div></div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label className="lbl">Name</label><input className="input-field" placeholder="e.g. Chase Checking…" value={label} onChange={e=>setLabel(e.target.value)} autoFocus/></div>
          <div>

/* ── Scheduled Payment Modal ─────────────────────────────────────────────── */
const WEEKDAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function SchedModal({onClose,onSave,accounts,categories,editing}){
  const expCats=categories.filter(c=>c.id!=="income");
  // isIncome: whether this is income (positive) or expense (negative)
  const [isIncome,setIsIncome]=useState(editing?!!(editing.isIncome):false);
  // recurrenceType: "monthly" | "weekly"
  const [recType,setRecType]=useState(editing?(editing.recurrenceType||"monthly"):"monthly");
  const [desc,setDesc]=useState(editing?editing.desc:"");
  const [amount,setAmount]=useState(editing?String(editing.amount):"");
  const [category,setCategory]=useState(editing?(editing.category||(editing.isIncome?"income":"misc")):"misc");
  const [account,setAccount]=useState(editing?editing.account:accounts[0].id);
  const [dayOfMonth,setDayOfMonth]=useState(editing?editing.dayOfMonth:1);
  const [dayOfWeek,setDayOfWeek]=useState(editing!=null&&editing.dayOfWeek!=null?editing.dayOfWeek:5);

  // When switching income/expense, reset category to appropriate default
  function switchType(toIncome){
    setIsIncome(toIncome);
    setCategory(toIncome?"income":"misc");
  }

  const save=()=>{
    const a=parseFloat(amount);
    if(!desc.trim()||isNaN(a)||a<=0)return;
    onSave({
      desc:desc.trim(),amount:a,category,account,isIncome,
      recurrenceType:recType,
      dayOfMonth:recType==="monthly"?parseInt(dayOfMonth):null,
      dayOfWeek:recType==="weekly"?parseInt(dayOfWeek):null,
    });
  };

  const accentColor=isIncome?"#4ade80":"#a78bfa";

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:400}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800,marginBottom:20}}>
          {editing?"Edit Schedule":"New Scheduled Entry"}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* Income / Expense toggle */}
          <div>
            <label className="lbl">Type</label>
            <div style={{display:"flex",gap:0,background:"#1a1a28",borderRadius:10,padding:4}}>
              {[[false,"↓ Expense"],[true,"↑ Income"]].map(([val,lbl])=>(
                <button key={String(val)} onClick={()=>switchType(val)}
                  style={{flex:1,background:isIncome===val?(val?"#4ade8022":"#f8717122"):"none",border:isIncome===val?`1px solid ${val?"#4ade8044":"#f8717144"}`:"1px solid transparent",color:isIncome===val?(val?"#4ade80":"#f87171"):"#555",borderRadius:8,padding:"9px 0",cursor:"pointer",fontFamily:"DM Mono",fontSize:12,transition:"all .15s"}}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          {/* Recurrence type toggle */}
          <div>
            <label className="lbl">Repeats</label>
            <div style={{display:"flex",gap:0,background:"#1a1a28",borderRadius:10,padding:4}}>
              {[["monthly","📅 Monthly"],["weekly","🔁 Weekly"]].map(([val,lbl])=>(
                <button key={val} onClick={()=>setRecType(val)}
                  style={{flex:1,background:recType===val?"#7c6fff22":"none",border:recType===val?"1px solid #7c6fff44":"1px solid transparent",color:recType===val?"#a78bfa":"#555",borderRadius:8,padding:"9px 0",cursor:"pointer",fontFamily:"DM Mono",fontSize:12,transition:"all .15s"}}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          <div><label className="lbl">Description</label><input className="input-field" placeholder={isIncome?"e.g. Paycheck, Freelance…":"e.g. Netflix, Rent…"} value={desc} onChange={e=>setDesc(e.target.value)} autoFocus/></div>
          <div><label className="lbl">Amount</label><input className="input-field" type="number" min="0.01" step="0.01" placeholder="0.00" value={amount} onChange={e=>setAmount(e.target.value)}/></div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              {recType==="monthly"?(
                <>
                  <label className="lbl">Day of Month</label>
                  <select className="input-field" value={dayOfMonth} onChange={e=>setDayOfMonth(e.target.value)}>
                    {DAYS.map(d=><option key={d} value={d}>{ordinal(d)}</option>)}
                  </select>
                </>
              ):(
                <>
                  <label className="lbl">Day of Week</label>
                  <select className="input-field" value={dayOfWeek} onChange={e=>setDayOfWeek(e.target.value)}>
                    {WEEKDAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
                  </select>
                </>
              )}
            </div>
            <div>
              <label className="lbl">Account</label>
              <select className="input-field" value={account} onChange={e=>setAccount(e.target.value)}>
                {accounts.map(a=><option key={a.id} value={a.id}>{a.icon} {a.label}</option>)}
              </select>
            </div>
          </div>

          <div><label className="lbl">Category</label>
            <select className="input-field" value={category} onChange={e=>setCategory(e.target.value)}>
              {(isIncome?categories.filter(c=>c.id==="income"):expCats).map(c=>(
                <option key={c.id} value={c.id}>{c.icon} {c.label}</option>
              ))}
            </select>
          </div>

          {/* Preview */}
          <div style={{padding:"10px 12px",background:"#0d0d18",borderRadius:9,border:`1px solid ${accentColor}33`,fontSize:11,color:"#555"}}>
            <span style={{color:accentColor}}>{isIncome?"↑ Income":"↓ Expense"}</span>
            {" — "}
            {recType==="monthly"
              ? <>on the <span style={{color:accentColor}}>{ordinal(dayOfMonth)}</span> of each month</>
              : <>every <span style={{color:accentColor}}>{WEEKDAYS[dayOfWeek]}</span></>
            }
            {amount&&!isNaN(parseFloat(amount))&&<span style={{color:isIncome?"#4ade80":"#f87171",marginLeft:8,fontWeight:600}}>{isIncome?"+":"-"}{fmt(parseFloat(amount)||0)}</span>}
          </div>

          <div style={{display:"flex",gap:10}}>
            <button className="btn-primary" style={{flex:1,background:isIncome?"#22c55e":"#7c6fff"}} onClick={save}>{editing?"Save Changes":"Add Schedule"}</button>
            <button onClick={onClose} style={{background:"#1e1e30",border:"1px solid #2a2a40",color:"#888",borderRadius:10,padding:"11px 18px",cursor:"pointer",fontFamily:"DM Mono",fontSize:13}}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── CSV Import Modal ───────────────────────────────────────────────────── */
function CsvModal({data,accounts,categories,onClose,onConfirm}){
  const {rows,file}=data;
  const catColor=id=>(categories.find(c=>c.id===id)||{color:"#94a3b8"}).color;
  const catLabel=id=>(categories.find(c=>c.id===id)||{label:id}).label;
  const acctById=id=>accounts.find(a=>a.id===id)||{label:id,color:"#94a3b8"};
  const income=rows.filter(r=>r.amount>0).reduce((s,r)=>s+r.amount,0);
  const expenses=rows.filter(r=>r.amount<0).reduce((s,r)=>s+r.amount,0);
  function fmt(n){const abs=Math.abs(n),s=abs.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?`−$${s}`:`$${s}`;}
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:580,width:"100%"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800,marginBottom:4}}>Import CSV</div>
        <div style={{fontSize:11,color:"#555",marginBottom:16}}>{file} · {rows.length} transaction{rows.length!==1?"s":""} found</div>
        {/* Summary strip */}
        <div style={{display:"flex",gap:16,padding:"10px 14px",background:"#0d0d18",borderRadius:10,border:"1px solid #1e1e30",marginBottom:14,fontSize:12,flexWrap:"wrap"}}>
          <span><span style={{color:"#555"}}>Rows </span><span style={{color:"#e8e6f0"}}>{rows.length}</span></span>
          <span><span style={{color:"#555"}}>In </span><span style={{color:"#4ade80"}}>{fmt(income)}</span></span>
          <span><span style={{color:"#555"}}>Out </span><span style={{color:"#f87171"}}>{fmt(expenses)}</span></span>
        </div>
        {/* Preview table */}
        <div style={{maxHeight:280,overflowY:"auto",marginBottom:16,display:"flex",flexDirection:"column",gap:3}}>
          {rows.slice(0,50).map((r,i)=>{
            const acct=acctById(r.account);
            return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"#0f0f1a",border:"1px solid #1a1a28",borderRadius:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,color:"#ccc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.desc}</div>
                  <div style={{display:"flex",gap:6,marginTop:2,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:10,color:"#555"}}>{r.date}</span>
                    <span style={{fontSize:10,color:catColor(r.category)}}>{catLabel(r.category)}</span>
                    <span style={{fontSize:10,color:acct.color,background:`${acct.color}18`,border:`1px solid ${acct.color}33`,padding:"1px 6px",borderRadius:999}}>{acct.label}</span>
                  </div>
                </div>
                <div style={{fontSize:12,fontWeight:500,color:r.amount>=0?"#4ade80":"#f87171",flexShrink:0}}>{fmt(r.amount)}</div>
              </div>
            );
          })}
          {rows.length>50&&<div style={{fontSize:11,color:"#555",textAlign:"center",padding:"6px 0"}}>…and {rows.length-50} more</div>}
        </div>
        <div style={{fontSize:10,color:"#555",marginBottom:14,padding:"8px 12px",background:"#1a1a28",borderRadius:8}}>
          💡 Categories and accounts are matched by name. Unmatched rows default to <strong style={{color:"#94a3b8"}}>Misc</strong> / <strong style={{color:"#60a5fa"}}>Checking 1</strong>.
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn-primary" style={{flex:1}} onClick={()=>onConfirm(rows)}>Import {rows.length} Transactions</button>
          <button onClick={onClose} style={{background:"#1e1e30",border:"1px solid #2a2a40",color:"#888",borderRadius:10,padding:"11px 18px",cursor:"pointer",fontFamily:"DM Mono",fontSize:13}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

  async function syncToSheet(){
    if(!sheetUrl||!syncReady.current){return;}
    // Read fresh data from localStorage — always current, never stale from closure
    const freshTx       = load(TX_KEY,   []);
    const freshSched    = load(SCHED_KEY, []);
    const freshAccts    = load(ACCT_KEY,  DEFAULT_ACCOUNTS);
    const freshCats     = load(CAT_KEY,   DEFAULT_CATEGORIES);
    const freshWb       = load(WB_KEY,    {income:0,incomeByAccount:{},bills:[],weekTx:[]});
    setSyncStatus("syncing");
    try{
      await sheetWrite(sheetUrl,{
        transactions:   freshTx,
        scheduled:      freshSched,
        accounts:       freshAccts,
        categories:     freshCats,
        weekly_budget:  encodeWb(freshWb),
      });
      await new Promise(r=>setTimeout(r,1500));
      const verify=await sheetRead(sheetUrl);
      const savedCount=verify?.transactions?.length??-1;
      if(savedCount>=0){
        setSyncStatus("ok");
        setLastSync(new Date());
        setTimeout(()=>setSyncStatus("idle"),3000);
      } else {
        setSyncStatus("error");
      }
    }catch(err){
      console.error("Sheet sync failed:",err);
      setSyncStatus("error");
    }
  }

  async function syncFromSheet(silent=false){
    if(!sheetUrl)return false;
    setSyncStatus("syncing");
    try{
      const data=await sheetRead(sheetUrl);
      const sheetHadData=!!(data.transactions?.length||data.accounts?.length);
      if(data.transactions?.length){
        nextId=Math.max(...data.transactions.map(t=>Number(t.id)||0),17)+1;
        setTransactions(data.transactions.map(t=>({...t,id:Number(t.id),amount:Number(t.amount)})));
      }
      if(data.scheduled?.length){
        nextSchedId=Math.max(...data.scheduled.map(s=>parseInt(String(s.id).replace("s",""))||0),9)+1;
        setScheduled(data.scheduled.map(s=>({isIncome:false,...s,amount:Number(s.amount)})));
      }
      if(data.accounts?.length){
        setAccounts(data.accounts.map(a=>({...a,startBalance:Number(a.startBalance)})));
      }
      if(data.categories?.length){
        setCategories(data.categories);
      }
      if(data.weekly_budget?.length){
        const decoded=decodeWb(data.weekly_budget);
        if(decoded.bills)nextWbId=Math.max(...decoded.bills.map(b=>parseInt(String(b.id).replace("wb",""))||0),9)+1;
        if(decoded.weekTx)nextWtxId=Math.max(...decoded.weekTx.map(t=>parseInt(String(t.id).replace("wt",""))||0),0)+1;
        setWb(decoded);
      }
      setSyncStatus("ok");
      setLastSync(new Date());
      setTimeout(()=>setSyncStatus("idle"),3000);
      if(!silent) showToast("Synced from Google Sheets ✓");
      return sheetHadData;
    }catch(err){
      console.error("Sheet load failed:",err);
      setSyncStatus("error");
      const msg=err instanceof Error?err.message:String(err);
      if(!silent) showToast("Sync failed: "+msg,false);
      return false;
    }
  }

  function testConnection(){
    const url=sheetUrlInput.trim();
    if(!url||testingConn)return;
    setTestingConn(true);setTestResult(null);
    const cbName="__ledgerTest_"+Date.now();
    const script=document.createElement("script");
    const timer=setTimeout(()=>{
      cleanup();
      setTestResult({ok:false,msg:"Timeout — check 'Anyone' access in deployment"});
      setTestingConn(false);
    },10000);
    function cleanup(){
      clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode)script.parentNode.removeChild(script);
    }
    window[cbName]=d=>{
      cleanup();
      if(d&&d.ok){
        const txCount=d.transactions?.length??0;
        if(txCount>0)
          setTestResult({ok:true,msg:`Connected ✓  —  ${txCount} transactions found in sheet`});
        else
          setTestResult({ok:true,msg:"Connected ✓  —  Sheet is empty (no data saved yet). Connect from your main device first to push data, then connect here to pull it."});
      } else {
        setTestResult({ok:false,msg:"Error: "+String(d?.error||"unknown response")});
      }
      setTestingConn(false);
    };
    script.onerror=()=>{
      cleanup();
      setTestResult({ok:false,msg:"Blocked — set 'Who has access' to 'Anyone' in deployment"});
      setTestingConn(false);
    };
    // Use action=read so we can see how much data is in the sheet
    script.src=`${url}?action=read&callback=${cbName}&t=${Date.now()}`;
    document.head.appendChild(script);
  }

  /* ── Weekly Budget ── */
  // Compute current Fri-Thu week window
  function getWeekWindow(){
    const now=new Date();
    const day=now.getDay(); // 0=Sun,1=Mon,...,5=Fri,6=Sat
    // days since last Friday
    const sinceF=day>=5?day-5:day+2;
    const fri=new Date(now); fri.setDate(now.getDate()-sinceF); fri.setHours(0,0,0,0);
    const thu=new Date(fri); thu.setDate(fri.getDate()+6); thu.setHours(23,59,59,999);
    return{fri,thu};
  }
  const {fri:weekStart,thu:weekEnd}=getWeekWindow();
  const weekStartStr=weekStart.toISOString().slice(0,10);
  const weekEndStr=weekEnd.toISOString().slice(0,10);
  function fmtDate(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}

  // Helper: get scheduled bills for any 7-day window starting at startDate
  function getSchedBillsForWindow(startDate){
    const bills=[];
    for(let i=0;i<7;i++){
      const d=new Date(startDate); d.setDate(startDate.getDate()+i);
      const dom=d.getDate(), dow=d.getDay();
      scheduled.filter(s=>{
        if(!s.active||s.isIncome)return false; // income doesn't count as a bill
        const recType=s.recurrenceType||"monthly";
        return recType==="weekly" ? s.dayOfWeek===dow : s.dayOfMonth===dom;
      }).forEach(s=>bills.push({...s,dueDate:d.toISOString().slice(0,10)}));
    }
    return bills;
  }

  // Current week (Fri-Thu) — filtered by selected account
  const weekSchedBills=getSchedBillsForWindow(weekStart)
    .filter(b=>wbAccount==="all"||b.account===wbAccount);
  const wbBillTotal=weekSchedBills.reduce((s,b)=>s+b.amount,0);
  // Current income: per-account if one selected, else sum of all account incomes
  const currentIncome=(()=>{
    if(wbAccount==="all"){
      return accounts.reduce((s,a)=>s+(wb.incomeByAccount?.[a.id]??0),0)||wb.income;
    }
    return wb.incomeByAccount?.[wbAccount]??wb.income;
  })();

  // Current account balance(s)
  const currentBalance=(()=>{
    if(wbAccount==="all") return accounts.reduce((s,a)=>s+acctBalance(a.id),0);
    return acctBalance(wbAccount);
  })();

  const wbAvailable=currentIncome-wbBillTotal;
  const wbSpent=wb.weekTx
    .filter(t=>wbAccount==="all"||t.account===wbAccount)
    .reduce((s,t)=>s+t.amount,0);
  const wbRemaining=wbAvailable-wbSpent;

  // Projected balance at end of this week: current balance + income - bills - weekly spending
  const projectedBalanceWeek1=currentBalance+currentIncome-wbBillTotal-wbSpent;

  // Next week window (Fri+7 → Thu+7)
  const nextWeekStart=new Date(weekStart); nextWeekStart.setDate(weekStart.getDate()+7);
  const nextWeekEnd=new Date(weekEnd);     nextWeekEnd.setDate(weekEnd.getDate()+7);
  const nextWeekBills=getSchedBillsForWindow(nextWeekStart)
    .filter(b=>wbAccount==="all"||b.account===wbAccount);
  const nextWeekBillTotal=nextWeekBills.reduce((s,b)=>s+b.amount,0);
  const nextWeekAvailable=currentIncome-nextWeekBillTotal;
  const nextWeekTight=nextWeekAvailable<(currentIncome*0.2);

  // Projected balance at end of next week
  const projectedBalanceWeek2=projectedBalanceWeek1+currentIncome-nextWeekBillTotal;

  // 2-week combined
  const twoWeekBillTotal=wbBillTotal+nextWeekBillTotal;
  const twoWeekAvailable=(currentIncome*2)-twoWeekBillTotal;
  // Weeks where bills exceed balance+income (danger — can't actually pay)
  const thisWeekOver=(currentBalance+currentIncome)<wbBillTotal;
  const nextWeekOver=(projectedBalanceWeek1+currentIncome)<nextWeekBillTotal;

  function addWbTx(){

  function deleteWbTx(id){setWb(prev=>({...prev,weekTx:prev.weekTx.filter(t=>t.id!==id)}));}
  function resetWeek(){
    const visibleTx=wbAccount==="all"
      ? wb.weekTx
      : wb.weekTx.filter(t=>t.account===wbAccount);

    function doClear(){
      setWb(prev=>({...prev,weekTx:wbAccount==="all"?[]:prev.weekTx.filter(t=>t.account!==wbAccount)}));
      showToast("Week cleared");
      setConfirmModal(null);
    }

    if(visibleTx.length===0){doClear();return;}

    const total=visibleTx.reduce((s,t)=>s+t.amount,0);
    const acctLabel=wbAccount!=="all"?" · "+acctById(wbAccount).label:"";

    function doTransfer(){
      if(wbAccount==="all"){
        const byAcct={};
        wb.weekTx.forEach(t=>{
          const aid=t.account||accounts[0]?.id||"chk1";
          byAcct[aid]=(byAcct[aid]||0)+t.amount;
        });
        const newTx=Object.entries(byAcct).map(([aid,amt])=>({
          id:nextId++,date:weekEndStr,desc:"Weekly Expenses",
          amount:-amt,category:"misc",account:aid,

  /* ── CSV Import ── */
  function handleCsvImport(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const text=ev.target.result;
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){showToast("CSV appears empty",false);return;}

        // Parse a CSV row handling quoted fields
        function parseRow(line){
          const fields=[];let cur="",inQ=false;
          for(let i=0;i<line.length;i++){
            const c=line[i];
            if(c==='"'){
              if(inQ&&line[i+1]==='"'){cur+='"';i++;} // escaped quote
              else inQ=!inQ;
            } else if(c===","&&!inQ){fields.push(cur.trim());cur="";}
            else{cur+=c;}
          }
          fields.push(cur.trim());
          return fields;
        }

        const header=parseRow(lines[0]).map(h=>h.toLowerCase().replace(/"/g,"").trim());
        const col=(...names)=>{
          for(const name of names){
            const i=header.findIndex(h=>h===name||h.includes(name));
            if(i>=0)return i;
          }
          return -1;
        };

        const dateCol  = col("date");
        const descCol  = col("description","desc","name","memo","narr");
        const amtCol   = col("amount","amt");
        const catCol   = col("category","cat");
        const acctCol  = col("account","acct");
        const xferCol  = col("transfer");

        if(dateCol<0||descCol<0||amtCol<0){
          showToast("Need at least Date, Description, Amount columns",false);
          e.target.value="";return;
        }

        const imported=[];
        for(let i=1;i<lines.length;i++){
          const fields=parseRow(lines[i]);
          if(fields.length<3)continue;

          // Skip transfer rows — they'll be created by the transfer feature
          if(xferCol>=0&&(fields[xferCol]||"").toLowerCase()==="yes")continue;

          const rawDate =(fields[dateCol]||"").replace(/"/g,"").trim();
          const rawDesc =(fields[descCol]||"").replace(/"/g,"").trim();
          const rawAmt  =(fields[amtCol] ||"0").replace(/"/g,"").trim();
          const rawCat  =catCol>=0?(fields[catCol]||"").replace(/"/g,"").trim():"";
          const rawAcct =acctCol>=0?(fields[acctCol]||"").replace(/"/g,"").trim():"";

          // Parse date: YYYY-MM-DD or MM/DD/YYYY or MM/DD/YY
          let date=rawDate;
          if(/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(date)){
            const [m,d,y]=date.split("/");
            date=`${y.length===2?"20"+y:y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
          }
          if(!/^\d{4}-\d{2}-\d{2}$/.test(date))continue;

          // Parse amount — handle regular minus, Unicode minus (−), parentheses (1,234.56)
          let amtStr=rawAmt
            .replace(/\u2212/g,"-")   // Unicode minus → regular minus
            .replace(/[^\d.\-]/g,"");  // strip everything except digits, dot, minus
          const amt=parseFloat(amtStr);
          if(isNaN(amt))continue;
          if(!rawDesc)continue;

          // Match category against current categories (not just defaults)
          const rawCatL=rawCat.toLowerCase();
          const matchedCat=
            categories.find(c=>c.label.toLowerCase()===rawCatL)||
            categories.find(c=>rawCatL.includes(c.label.toLowerCase()))||
            categories.find(c=>c.label.toLowerCase().includes(rawCatL)&&rawCatL.length>2);
          const category=matchedCat?matchedCat.id:"misc";

          // Match account by label
          const rawAcctL=rawAcct.toLowerCase();
          const matchedAcct=
            accounts.find(a=>a.label.toLowerCase()===rawAcctL)||
            accounts.find(a=>rawAcctL.includes(a.label.toLowerCase()));
          const account=matchedAcct?matchedAcct.id:accounts[0]?.id||"chk1";

          imported.push({id:nextId++,date,desc:rawDesc,amount:amt,category,account});
        }

        if(imported.length===0){showToast("No valid rows found in CSV",false);e.target.value="";return;}
        setCsvModal({rows:imported,file:file.name});
      }catch(err){
        showToast("Error reading CSV: "+err.message,false);
      }
      e.target.value="";
    };
    reader.readAsText(file);
  }

                      <div style={{width:40,height:40,borderRadius:10,background:badgeBg,border:`1px solid ${badgeBorder}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontWeight:700,color:badgeColor,flexShrink:0,textAlign:"center",lineHeight:1.1}}>
                        <span style={{fontSize:isWeekly?8:12}}>{isWeekly?(WEEKDAYS[s.dayOfWeek||0]||"").slice(0,3):String(s.dayOfMonth||1)}</span>
                        <span style={{fontSize:7,opacity:0.7}}>{isWeekly?"wkly":"th"}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,color:"#e8e6f0",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.desc}</div>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap"}}>
                          <span style={{fontSize:10,color:badgeColor,background:badgeBg,padding:"2px 7px",borderRadius:999}}>
                            {s.isIncome?"↑ Income · ":""}{schedLabel}
                          </span>
                          <span style={{fontSize:10,color:cat.color}}>{cat.icon} {catLabel(s.category)}</span>
                        </div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:15,fontWeight:700,color:s.isIncome?"#4ade80":"#f87171"}}>{s.isIncome?"+":"−"}{fmt(s.amount)}</div>
                        <div style={{fontSize:10,color:acct.color,marginTop:2}}>{acct.label}</div>
                      </div>
                    </div>
                    {/* Bottom row: status chips + action buttons */}
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      {appliedToday&&<span style={{fontSize:9,color:"#4ade80",background:"#4ade8018",border:"1px solid #4ade8033",padding:"2px 7px",borderRadius:999}}>✓ applied today</span>}

                      <div style={{marginLeft:"auto",display:"flex",gap:5}}>
                        {!appliedToday&&s.active&&(
                          <button onClick={()=>applySchedNow(s)} className="btn-sm" style={{color:"#7c6fff",borderColor:"#7c6fff44",fontSize:11,padding:"5px 10px"}}>Apply</button>
                        )}
                        <button onClick={()=>setSchedModal(s)} className="btn-sm" style={{fontSize:11,padding:"5px 10px"}}>Edit</button>
                        <button onClick={()=>toggleSched(s.id)} className="btn-sm" style={{color:s.active?"#f59e0b":"#4ade80",fontSize:11,padding:"5px 10px"}}>{s.active?"Pause":"Resume"}</button>
                        <button onClick={()=>deleteSched(s.id)} className="btn-sm" style={{color:"#f87171",fontSize:11,padding:"5px 10px"}}>Del</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            {scheduled.length===0&&<div style={{textAlign:"center",color:"#555",padding:"50px 0",fontSize:13}}>No scheduled payments yet</div>}
          </div>
        )}

        {/* ══ WEEKLY BUDGET ══════════════════════════════════════════ */}
        {view==="budget"&&(
          <div>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,gap:10}}>
              <div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>Weekly Budget</div>
                <div style={{fontSize:11,color:"#7c6fff",marginTop:5,letterSpacing:"0.04em"}}>{fmtDate(weekStart)} — {fmtDate(weekEnd)}</div>
                <div style={{fontSize:10,color:"#555",marginTop:3}}>Fri → Thu · {weekSchedBills.length} bill{weekSchedBills.length!==1?"s":""} due this week</div>
              </div>
              <button onClick={resetWeek} style={{background:"#1e1e30",border:"1px solid #2a2a40",color:"#888",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:11,fontFamily:"DM Mono",flexShrink:0,touchAction:"manipulation"}}>Reset</button>
            </div>

            {/* Account selector */}
            <div style={{display:"flex",gap:7,marginBottom:16,overflowX:"auto"}}>
              <button className={`seg-btn ${wbAccount==="all"?"active":""}`} onClick={()=>setWbAccount("all")} style={{flexShrink:0}}>All Accounts</button>
              {accounts.map(a=>(
                <button key={a.id} className={`seg-btn ${wbAccount===a.id?"active":""}`}
                  onClick={()=>setWbAccount(a.id)}
                  style={{flexShrink:0,color:wbAccount===a.id?a.color:"#555",borderColor:wbAccount===a.id?`${a.color}66`:"transparent",background:wbAccount===a.id?`${a.color}12`:"none"}}>
                  {a.icon} {a.label}
                </button>
              ))}
            </div>

            {/* ── Overspend alerts ── */}
            {(thisWeekOver||nextWeekOver)&&(
              <div style={{marginBottom:16,display:"flex",flexDirection:"column",gap:8}}>
                {thisWeekOver&&(
                  <div style={{padding:"12px 14px",background:"#f8717112",border:"1px solid #f8717144",borderRadius:10,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:16,flexShrink:0}}>⚠️</span>
                    <div>
                      <div style={{fontSize:12,color:"#f87171",fontWeight:600,marginBottom:2}}>Bills exceed income this week!</div>
                      <div style={{fontSize:11,color:"#f8717199"}}>Bills {fmt(wbBillTotal)} vs balance + income {fmt(currentBalance+currentIncome)} — you're short {fmt(wbBillTotal-(currentBalance+currentIncome))}. Consider holding off on discretionary spending.</div>
                    </div>
                  </div>
                )}
                {nextWeekOver&&(
                  <div style={{padding:"12px 14px",background:"#f59e0b12",border:"1px solid #f59e0b44",borderRadius:10,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:16,flexShrink:0}}>⚠️</span>
                    <div>
                      <div style={{fontSize:12,color:"#f59e0b",fontWeight:600,marginBottom:2}}>Heavy bills coming next week</div>
                      <div style={{fontSize:11,color:"#f59e0b99"}}>Next week ({fmtDate(nextWeekStart)}–{fmtDate(nextWeekEnd)}) has {fmt(nextWeekBillTotal)} in bills vs projected balance + income {fmt(projectedBalanceWeek1+currentIncome)} — short {fmt(nextWeekBillTotal-(projectedBalanceWeek1+currentIncome))}. Spend carefully this week.</div>
                    </div>
                  </div>
                )}
                {!thisWeekOver&&nextWeekTight&&(
                  <div style={{padding:"12px 14px",background:"#f59e0b0a",border:"1px solid #f59e0b33",borderRadius:10,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:15,flexShrink:0}}>💡</span>
                    <div style={{fontSize:11,color:"#f59e0b99"}}>Next week leaves only {fmt(nextWeekAvailable)} after bills — consider saving some of this week's available budget.</div>
                  </div>
                )}
              </div>
            )}

            {/* ── 4 Summary Boxes ── */}
            <div className="grid-budget" style={{gap:12,marginBottom:20}}>
              {/* Box 0: Current Balance */}
              <div className="budget-box" style={{border:`1px solid ${currentBalance>=0?"#60a5fa33":"#f8717133"}`}}>
                <div className="accent" style={{background:`linear-gradient(90deg,${currentBalance>=0?"#60a5fa":"#f87171"},${currentBalance>=0?"#60a5fa44":"#f8717144"})`}}/>
                <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>
                  {wbAccount==="all"?"Total Balance":acctById(wbAccount).label}
                </div>
                <div style={{fontSize:22,fontWeight:700,color:currentBalance>=0?"#60a5fa":"#f87171",fontFamily:"'Syne',sans-serif",letterSpacing:"-0.02em"}}>{fmt(currentBalance)}</div>
                <div style={{fontSize:10,color:"#555",marginTop:4}}>Current account balance</div>
              </div>

              {/* Box 1: Weekly Income — per account or global */}
              <div className="budget-box" style={{border:"1px solid #4ade8033"}}>
                <div className="accent" style={{background:"linear-gradient(90deg,#4ade80,#4ade8044)"}}/>
                <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>
                  {wbAccount==="all"?"Total Income":acctById(wbAccount).label+" Income"}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{color:"#555",fontSize:15,fontWeight:300}}>$</span>
                  {wbAccount==="all"?(
                    <span style={{color:"#4ade80",fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:700,letterSpacing:"-0.02em"}}>{currentIncome.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
                  ):(
                    <input type="number" min="0" step="0.01"
                      value={wb.incomeByAccount?.[wbAccount]??wb.income}
                      onChange={e=>setWb(prev=>({...prev,incomeByAccount:{...(prev.incomeByAccount||{}), [wbAccount]:parseFloat(e.target.value)||0}}))}
                      style={{background:"none",border:"none",color:"#4ade80",fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:700,width:"100%",letterSpacing:"-0.02em"}}/>
                  )}
                </div>
                <div style={{fontSize:10,color:"#555",marginTop:4}}>
                  {wbAccount==="all"?"Sum of all account incomes":"Tap to edit this account's income"}
                </div>
              </div>

              {/* Box 2: Expected Bills */}
              <div className="budget-box" style={{border:`1px solid ${thisWeekOver?"#f8717166":"#f8717133"}`}}>
                <div className="accent" style={{background:`linear-gradient(90deg,#f87171,#f8717144)`}}/>
                <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Bills This Week</div>
                <div style={{fontSize:22,fontWeight:700,color:"#f87171",fontFamily:"'Syne',sans-serif",letterSpacing:"-0.02em"}}>
                  −{fmt(wbBillTotal)}
                  {thisWeekOver&&<span style={{fontSize:12,marginLeft:6}}>⚠️</span>}
                </div>
                <div style={{fontSize:10,color:"#555",marginTop:4,lineHeight:1.5}}>
                  {weekSchedBills.length>0?weekSchedBills.map(b=>b.desc).join(", "):"No bills this week"}
                </div>
              </div>

              {/* Box 3: Projected end-of-week balance */}
              <div className="budget-box" style={{border:`1px solid ${projectedBalanceWeek1>=0?"#7c6fff33":"#f8717166"}`}}>
                <div className="accent" style={{background:`linear-gradient(90deg,${projectedBalanceWeek1>=0?"#7c6fff":"#f87171"},${projectedBalanceWeek1>=0?"#7c6fff44":"#f8717144"})`}}/>
                <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>End of Week Est.</div>
                <div style={{fontSize:22,fontWeight:700,color:projectedBalanceWeek1>=0?"#7c6fff":"#f87171",fontFamily:"'Syne',sans-serif",letterSpacing:"-0.02em"}}>{fmt(projectedBalanceWeek1)}</div>
                <div style={{fontSize:10,color:"#555",marginTop:4}}>Balance + income − bills − spent</div>
              </div>
            </div>

            {/* Progress bar */}
            {wbAvailable>0&&(
              <div style={{marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555",marginBottom:5}}>
                  <span>Spent {Math.min(100,Math.round((wbSpent/wbAvailable)*100))}% of available</span>
                  <span style={{color:wbRemaining>=0?"#4ade80":"#f87171"}}>{fmt(wbRemaining)} left</span>
                </div>
                <div style={{height:6,background:"#1e1e30",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.min(100,(wbSpent/wbAvailable)*100)}%`,background:wbRemaining>=0?"#f59e0b":"#f87171",borderRadius:3,transition:"width .4s ease"}}/>
                </div>
              </div>
            )}

            {/* ── 2-Week Outlook ── */}
            <div style={{marginBottom:20,padding:"14px 16px",background:"#0d0d18",borderRadius:12,border:"1px solid #1e1e30"}}>
              <div style={{fontSize:11,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>2-Week Outlook</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {/* This week column */}
                <div style={{padding:"12px",background:"#11111c",borderRadius:10,border:`1px solid ${thisWeekOver?"#f8717144":"#1e1e30"}`}}>
                  <div style={{fontSize:10,color:"#7c6fff",fontWeight:600,marginBottom:8,letterSpacing:"0.04em"}}>THIS WEEK</div>
                  <div style={{fontSize:10,color:"#555",marginBottom:6}}>{fmtDate(weekStart)} — {fmtDate(weekEnd)}</div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,gap:4}}>
                    <span style={{color:"#555"}}>Balance</span><span style={{color:currentBalance>=0?"#60a5fa":"#f87171"}}>{fmt(currentBalance)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:3,gap:4}}>
                    <span style={{color:"#555"}}>+ Income</span><span style={{color:"#4ade80"}}>+{fmt(currentIncome)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:3,gap:4}}>
                    <span style={{color:"#555"}}>− Bills</span><span style={{color:"#f87171"}}>−{fmt(wbBillTotal)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:3,gap:4}}>
                    <span style={{color:"#555"}}>− Spent</span><span style={{color:"#f59e0b"}}>−{fmt(wbSpent)}</span>
                  </div>
                  <div style={{height:1,background:"#1e1e30",margin:"8px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600}}>
                    <span style={{color:"#aaa"}}>Est. End Balance</span>
                    <span style={{color:projectedBalanceWeek1>=0?"#4ade80":"#f87171"}}>{fmt(projectedBalanceWeek1)}</span>
                  </div>
                  {thisWeekOver&&<div style={{fontSize:9,color:"#f87171",marginTop:4}}>⚠ bills exceed balance + income</div>}
                </div>
                {/* Next week column */}
                <div style={{padding:"12px",background:"#11111c",borderRadius:10,border:`1px solid ${nextWeekOver?"#f59e0b44":nextWeekTight?"#f59e0b22":"#1e1e30"}`}}>
                  <div style={{fontSize:10,color:"#34d399",fontWeight:600,marginBottom:8,letterSpacing:"0.04em"}}>NEXT WEEK</div>
                  <div style={{fontSize:10,color:"#555",marginBottom:6}}>{fmtDate(nextWeekStart)} — {fmtDate(nextWeekEnd)}</div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,gap:4}}>
                    <span style={{color:"#555"}}>Start Balance</span><span style={{color:projectedBalanceWeek1>=0?"#60a5fa":"#f87171"}}>{fmt(projectedBalanceWeek1)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:3,gap:4}}>
                    <span style={{color:"#555"}}>+ Income</span><span style={{color:"#4ade80"}}>+{fmt(currentIncome)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:3,gap:4}}>
                    <span style={{color:"#555"}}>− Bills</span><span style={{color:"#f87171"}}>−{fmt(nextWeekBillTotal)}</span>
                  </div>
                  {nextWeekBills.length>0&&(
                    <div style={{fontSize:9,color:"#555",marginTop:2,lineHeight:1.4}}>{nextWeekBills.map(b=>`${b.desc} (${b.dueDate.slice(5)})`).join(", ")}</div>
                  )}
                  <div style={{height:1,background:"#1e1e30",margin:"8px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600}}>
                    <span style={{color:"#aaa"}}>Est. End Balance</span>
                    <span style={{color:projectedBalanceWeek2>=0?"#4ade80":"#f87171"}}>{fmt(projectedBalanceWeek2)}</span>
                  </div>
                  {nextWeekOver&&<div style={{fontSize:9,color:"#f87171",marginTop:4}}>⚠ may go negative</div>}
                  {!nextWeekOver&&nextWeekTight&&<div style={{fontSize:9,color:"#f59e0b",marginTop:4}}>💡 tight week ahead</div>}
                </div>
              </div>
              {/* 2-week summary */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,padding:"10px 12px",background:"#11111c",borderRadius:8,border:"1px solid #1e1e30"}}>
                <span style={{fontSize:11,color:"#555"}}>Projected balance in 2 weeks</span>
                <span style={{fontSize:14,fontWeight:700,color:projectedBalanceWeek2>=0?"#e8e6f0":"#f87171",fontFamily:"'Syne',sans-serif"}}>{fmt(projectedBalanceWeek2)}</span>
              </div>
            </div>

            <div className="grid-weekly">
              {/* Bills Due This Week */}
              <div>
                <div style={{fontSize:11,color:"#555",letterSpacing:"0.1em",marginBottom:10,textTransform:"uppercase"}}>Bills Due This Week</div>
                <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:10}}>
                  {weekSchedBills.length===0&&<div style={{fontSize:12,color:"#555",padding:"10px 0"}}>No bills this week</div>}
                  {weekSchedBills.map((b,i)=>{
                    const acct=acctById(b.account);
                    return(
                      <div key={b.id+i} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",background:"#11111c",border:"1px solid #1e1e30",borderRadius:9}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,color:"#ccc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.desc}</div>
                          <div style={{display:"flex",alignItems:"center",gap:5,marginTop:2}}>
                            <span style={{fontSize:10,color:"#555"}}>Due {b.dueDate.slice(5)}</span>
                            <span className="acct-chip" style={{background:`${acct.color}18`,borderColor:`${acct.color}33`,color:acct.color}}>{acct.label}</span>
                          </div>
                        </div>
                        <div style={{fontSize:12,color:"#f87171",flexShrink:0,fontWeight:500}}>−{fmt(b.amount)}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{fontSize:11,color:"#555",padding:"9px 11px",background:"#0d0d18",borderRadius:9,border:"1px dashed #2a2a40"}}>
                  From <button onClick={()=>setView("scheduled")} style={{background:"none",border:"none",color:"#7c6fff",cursor:"pointer",fontFamily:"DM Mono",fontSize:11,padding:0,textDecoration:"underline"}}>Scheduled Payments</button>
                </div>
              </div>

              {/* Weekly Transactions */}
              <div>
                <div style={{fontSize:11,color:"#555",letterSpacing:"0.1em",marginBottom:10,textTransform:"uppercase"}}>This Week's Spending</div>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10,maxHeight:220,overflowY:"auto"}}>
                  {[...wb.weekTx].filter(t=>wbAccount==="all"||t.account===wbAccount).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>(
                    <div key={t.id} className="week-tx-row">
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,color:"#ccc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.desc}</div>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:1}}>
                          <span style={{fontSize:10,color:"#555"}}>{t.date}</span>
                          {wbAccount==="all"&&t.account&&(()=>{const a=acctById(t.account);return<span style={{fontSize:9,color:a.color,background:`${a.color}18`,padding:"1px 5px",borderRadius:999}}>{a.label}</span>;})()}
                        </div>
                      </div>
                      <div style={{fontSize:12,color:"#f87171",flexShrink:0}}>−{fmt(t.amount)}</div>
                      <button onClick={()=>deleteWbTx(t.id)} className="btn-sm" style={{flexShrink:0}}>×</button>
                    </div>
                  ))}
                  {wb.weekTx.length===0&&<div style={{fontSize:12,color:"#555",padding:"10px 0"}}>No transactions yet</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  <input type="date" className="input-field" style={{fontSize:12}} value={wtxForm.date} onChange={e=>setWtxForm(f=>({...f,date:e.target.value}))}/>
                  <input className="input-field" style={{fontSize:12}} placeholder="What did you spend on?" value={wtxForm.desc} onChange={e=>setWtxForm(f=>({...f,desc:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addWbTx()}/>
                  <div style={{display:"flex",gap:7}}>
                    <input className="input-field" style={{fontSize:12}} type="number" min="0" step="0.01" placeholder="Amount" value={wtxForm.amount} onChange={e=>setWtxForm(f=>({...f,amount:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addWbTx()}/>
                    <button onClick={addWbTx} className="btn-primary" style={{padding:"10px 16px",flexShrink:0}}>Add</button>
                  </div>
                  {wbAccount==="all"&&(
                    <div style={{fontSize:10,color:"#555"}}>
                      Transaction will be assigned to <strong style={{color:"#aaa"}}>{acctById(accounts[0]?.id||"chk1").label}</strong> — select an account above to assign to a specific one
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ══ CATEGORIES ═════════════════════════════════════════════ */}
        {view==="cats"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>Categories</div><div style={{fontSize:11,color:"#555",marginTop:4}}>{categories.length} total · {categories.filter(c=>!c.builtIn).length} custom</div></div>
              <button className="btn-primary" onClick={()=>setCatModal("new")}>+ New</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {categories.map(c=>{
                const txCount=transactions.filter(t=>t.category===c.id).length;
                return(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:"#11111c",border:"1px solid #1e1e30",borderRadius:12}}>
                    <div style={{width:38,height:38,borderRadius:10,background:`${c.color}22`,border:`1px solid ${c.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{c.icon}</div>
                    <div style={{flex:1}}><div style={{fontSize:13,color:c.color,fontWeight:500}}>{c.label}</div><div style={{fontSize:11,color:"#555",marginTop:2}}>{txCount} transaction{txCount!==1?"s":""} · {c.builtIn?"built-in":<span style={{color:"#7c6fff"}}>custom</span>}</div></div>
                    <div style={{display:"flex",gap:5}}>
                      <button onClick={()=>setCatModal(c)} className="btn-sm">edit</button>
                      {!c.builtIn&&<button onClick={()=>handleDeleteCat(c.id)} className="btn-sm">del</button>}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:16,padding:"14px 18px",background:"#11111c",borderRadius:12,border:"1px dashed #2a2a40",textAlign:"center"}}>
              <button onClick={()=>setCatModal("new")} style={{background:"none",border:"none",color:"#7c6fff",cursor:"pointer",fontFamily:"DM Mono",fontSize:13}}>+ Create a new category</button>
            </div>
          </div>
        )}
      </div>{/* end page-content */}

      {/* ── Bottom Tab Bar (mobile) ── */}
      <nav className="bottom-nav">
        {tabItems.map(({v,icon,label})=>(
          <button key={v} className={`tab-btn ${view===v?"active":""}`} onClick={()=>goTo(v)}>
            <span className="tab-icon">{icon}</span>
            <span>{label}</span>
          </button>
        ))}
      </nav>

      {/* ── Google Sheets Settings ── */}
      {settingsOpen&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setSettingsOpen(false)}>
          <div className="modal" style={{maxWidth:480}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800,marginBottom:6}}>☁️ Google Sheets Sync</div>
            <div style={{fontSize:11,color:"#555",marginBottom:18}}>Auto-saves to your Google Sheet 2 seconds after any change. Sync across all your devices.</div>
            {sheetUrl&&(
              <div style={{padding:"10px 14px",background:syncStatus==="error"?"#f8717110":"#4ade8010",border:`1px solid ${syncStatus==="error"?"#f8717133":"#4ade8033"}`,borderRadius:10,marginBottom:16,fontSize:11,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                <span style={{color:syncStatus==="error"?"#f87171":"#4ade80"}}>
                  {syncStatus==="error"?"✗ Last sync failed":syncStatus==="syncing"?"⟳ Syncing…":lastSync?"✓ Last synced "+lastSync.toLocaleTimeString():"Connected — not synced yet"}
                </span>
                <button onClick={syncFromSheet} style={{background:"none",border:"none",color:"#7c6fff",cursor:"pointer",fontFamily:"DM Mono",fontSize:11,textDecoration:"underline",flexShrink:0}}>Sync now</button>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <label className="lbl">Apps Script Web App URL</label>
                <input className="input-field" placeholder="https://script.google.com/macros/s/…/exec"
                  value={sheetUrlInput} onChange={e=>{setSheetUrlInput(e.target.value);setTestResult(null);}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <button onClick={testConnection} disabled={!sheetUrlInput.trim()||testingConn}
                  style={{background:"#1a1a28",border:"1px solid #2a2a40",color:testingConn?"#555":"#a78bfa",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontFamily:"DM Mono",fontSize:12,opacity:(!sheetUrlInput.trim()||testingConn)?0.5:1}}>
                  {testingConn?"Testing…":"Test Connection"}
                </button>
                {testResult&&<span style={{fontSize:11,color:testResult.ok?"#4ade80":"#f87171",flex:1}}>{testResult.ok?"✓":"✗"} {testResult.msg}</span>}
              </div>
              <div style={{padding:"12px 14px",background:"#0d0d18",borderRadius:10,border:"1px solid #1e1e30",fontSize:11,color:"#555",lineHeight:1.9}}>
                <div style={{color:"#aaa",fontWeight:600,marginBottom:4}}>Setup steps:</div>
                <div>1. Open your Google Sheet → <strong style={{color:"#e8e6f0"}}>Extensions → Apps Script</strong></div>
                <div>2. Paste the <strong style={{color:"#e8e6f0"}}>LedgerScript.gs</strong> code and save</div>
                <div>3. Click <strong style={{color:"#e8e6f0"}}>Deploy → New deployment</strong></div>
                <div>4. Type: <strong style={{color:"#e8e6f0"}}>Web app</strong> · Execute as: <strong style={{color:"#e8e6f0"}}>Me</strong></div>
                <div>5. Who has access: <strong style={{color:"#e8e6f0"}}>Anyone</strong> → Deploy</div>
                <div>6. Copy the Web App URL and paste it above</div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button className="btn-primary" style={{flex:1}} onClick={()=>saveSheetUrlAndConnect(sheetUrlInput)}>
                  {sheetUrl?"Update & Reconnect":"Connect Sheet"}
                </button>
                {sheetUrl&&(
                  <button onClick={()=>{saveSheetUrl("");setSheetUrl("");setSettingsOpen(false);showToast("Disconnected — data still saved locally",false);}}
                    style={{background:"#1e1e30",border:"1px solid #f8717133",color:"#f87171",borderRadius:10,padding:"11px 14px",cursor:"pointer",fontFamily:"DM Mono",fontSize:12}}>
                    Disconnect
                  </button>
                )}
                <button onClick={()=>setSettingsOpen(false)}
                  style={{background:"#1e1e30",border:"1px solid #2a2a40",color:"#888",borderRadius:10,padding:"11px 14px",cursor:"pointer",fontFamily:"DM Mono",fontSize:12}}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {confirmModal&&<ConfirmModal {...confirmModal}/>}
      {qaModal&&<QuickAddModal editing={qaModal==="new"?null:qaModal} accounts={accounts} categories={categories} onClose={()=>setQaModal(false)} onSave={handleSaveQa} onDelete={qaModal!=="new"?()=>handleDeleteQa(qaModal.id):undefined}/>}
      {catModal&&<CategoryModal editing={catModal==="new"?null:catModal} onClose={()=>setCatModal(false)} onSave={handleSaveCat}/>}
      {csvModal&&<CsvModal data={csvModal} accounts={accounts} categories={categories} onClose={()=>setCsvModal(false)} onConfirm={confirmCsvImport}/>}
      {acctModal&&<AccountModal account={acctModal} onClose={()=>setAcctModal(false)} onSave={handleSaveAcct} onDelete={acctModal.id&&accounts.length>1?()=>handleDeleteAcct(acctModal.id):null}/>}
      {xferModal&&<TransferModal accounts={accounts} onClose={()=>setXferModal(false)} onSave={handleTransfer}/>}
      {schedModal&&<SchedModal editing={schedModal==="new"?null:schedModal} accounts={accounts} categories={categories} onClose={()=>setSchedModal(false)} onSave={handleSaveSched}/>}

      {toast&&<div className="toast" style={{borderColor:toast.ok?"#4ade8044":"#f8717144",color:toast.ok?"#4ade80":"#f87171"}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
